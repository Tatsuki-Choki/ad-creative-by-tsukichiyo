campaign: 英語脳セミナー
date: "2026-03-13"
type: banner
size: 1200x628px
aspect_ratio: "16:9"
platform: Meta フィード広告
target:
  age: 20〜30代
  gender: 女性
  profile: 英語初心者、独学で勉強中の社会人
tone: 明るい・親しみやすい・清潔感

prompts:
  - name: 共感型（悩みに寄り添う）
    prompt: |
      横長のMeta広告バナー。アスペクト比16:9。
      明るく清潔感のあるセミナー集客用デザイン。

      左側に20代後半の日本人女性。カジュアルな白いブラウスを着て、
      困った表情で英語のテキストブックを片手に持ち、もう一方の手で頭を抱えている。
      背景は柔らかいパステルブルーのグラデーション。自然光で明るく照らされている。

      右側に大きなテキスト:
      上部に吹き出しで "何ヶ月も勉強してるのに全然話せない…" （手書き風フォント、グレー）
      中央に "それ、あなたのせいじゃないんです。" （太字のゴシック体、ダークネイビー、大きめ）
      下部に丸いバッジが3つ横並び:
        - "瞬間英作文" に×印
        - "単語暗記" に×印
        - "発音記号" に×印
      各バッジはピンク色の円形。

      最下部に "無料セミナーに参加する →" のCTAボタン（コーラルピンクの角丸ボタン、白文字）。
      全体的にリファレンスのセミナー広告バナーのようなレイアウト。親しみやすく信頼感のあるトーン。
    output: banners/drafts/20260313_142533_横長のMeta広告バナー。アスペクト比16:9。明るく清潔感_1.png

  - name: 解決型（英語脳への切り替え）
    prompt: |
      横長のMeta広告バナー。アスペクト比16:9。
      明るくモダンなセミナー集客用デザイン。

      左側に25歳くらいの日本人女性。ミントグリーンのニットを着て、
      人差し指を立てて「ポイント！」というジェスチャーをしながら、
      自信に満ちた明るい笑顔でカメラに目線を向けている。
      背景は白とソフトなミントグリーンのグラデーション。柔らかい自然光。

      右側のテキストエリア:
      上部に小さく "英語が話せる人は何が違う？" （グレー、細めのゴシック体）
      中央に大きく "「英語脳」に切り替える3ステップ" （太字ゴシック、ダークネイビー）
      "英語脳" の部分はコーラルピンクのマーカー風ハイライト。

      下部に丸いバッジが3つ横並び（ソフトピンクの円形）:
        - "翻訳グセを解消！"
        - "日本語を挟まない！"
        - "音の塊で話せる！"

      最下部に "参加無料" の赤いタグと "詳しくはこちら →" のCTAボタン。
      全体的に明るくポジティブで、20代女性に響く清潔感のあるデザイン。
    output: banners/drafts/20260313_142613_横長のMeta広告バナー。アスペクト比16:9。明るくモダン_1.png

  - name: 行動喚起型（限定感・CTA重視）
    prompt: |
      横長のMeta広告バナー。アスペクト比16:9。
      温かみのあるセミナー集客用デザイン。

      左側に20代後半の日本人女性。白いTシャツにベージュのカーディガン。
      ノートパソコンを開きながら、画面を見て嬉しそうに微笑んでいる。
      背景は柔らかいクリームベージュとピンクのグラデーション。
      カフェのような温かみのある自然光。

      右側のテキストエリア:
      上部に吹き出しで "300人以上が実感！" （手書き風、コーラルピンク）
      中央に大きく "あなただけの英語学習ロードマップ" （太字ゴシック、ダークネイビー）
      "ロードマップ" にコーラルピンクの下線。

      下部にゴールドの丸いバッジが3つ横並び:
        - "1対1ヒアリング"
        - "カリキュラム作成"
        - "参加無料"

      最下部に "人数限定" の赤いラベルと "今すぐ申し込む →" のCTAボタン（コーラルピンク、白文字）。
      全体的に温かく親しみやすいトーンで、行動を促すデザイン。
    output: banners/drafts/20260313_142651_横長のMeta広告バナー。アスペクト比16:9。温かみのある_1.png
